<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#f5c400" />
  <title>Test by EFK - Demo Fintech App</title>
  <style>
    :root {
      --bg: #0f1115;
      --surface: #171a21;
      --surface-2: #1f2430;
      --card: #ffffff;
      --text: #101217;
      --muted: #727885;
      --yellow: #f5c400;
      --yellow-deep: #e3ad00;
      --yellow-soft: #fff3b8;
      --success: #1aa36f;
      --danger: #e45454;
      --shadow: 0 20px 50px rgba(0,0,0,.18);
      --radius-xl: 28px;
      --radius-lg: 22px;
      --radius-md: 16px;
      --radius-sm: 12px;
      --font: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    }

    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      min-height: 100%;
      font-family: var(--font);
      background:
        radial-gradient(circle at top left, #2b2200 0%, transparent 25%),
        radial-gradient(circle at bottom right, #3d3100 0%, transparent 20%),
        linear-gradient(180deg, #090a0d 0%, #101318 100%);
      color: #fff;
      overflow-x: hidden;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px;
    }

    .phone {
      width: min(100%, 420px);
      min-height: 860px;
      background: linear-gradient(180deg, #fcfcfd 0%, #f6f7fb 100%);
      border-radius: 38px;
      box-shadow: 0 30px 80px rgba(0,0,0,.45);
      position: relative;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,.14);
    }

    .notch {
      width: 150px;
      height: 30px;
      background: #111;
      border-radius: 0 0 20px 20px;
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      z-index: 30;
    }

    .screen {
      min-height: 860px;
      position: relative;
      background: linear-gradient(180deg, #fffaf0 0%, #f8f8fb 100%);
    }

    .splash {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at top right, rgba(255,255,255,.18), transparent 30%),
        linear-gradient(180deg, #f5c400 0%, #d79f00 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      z-index: 50;
      transition: opacity .55s ease, visibility .55s ease;
    }

    .splash.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .logo-wrap {
      width: 96px;
      height: 96px;
      border-radius: 28px;
      background: rgba(255,255,255,.2);
      backdrop-filter: blur(10px);
      display: grid;
      place-items: center;
      box-shadow: 0 18px 30px rgba(0,0,0,.15);
    }

    .logo-mark {
      width: 52px;
      height: 52px;
      border-radius: 18px;
      background: #fff;
      position: relative;
      overflow: hidden;
    }

    .logo-mark::before,
    .logo-mark::after {
      content: "";
      position: absolute;
      background: var(--yellow);
      border-radius: 999px;
    }

    .logo-mark::before {
      width: 36px;
      height: 10px;
      top: 12px;
      left: 8px;
      transform: rotate(-28deg);
      background: #111;
    }

    .logo-mark::after {
      width: 26px;
      height: 10px;
      bottom: 14px;
      right: 7px;
      background: var(--yellow);
      transform: rotate(-28deg);
    }

    .brand-title {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -.03em;
      color: #161200;
      text-align: center;
    }

    .brand-sub {
      color: rgba(22,18,0,.7);
      font-size: 14px;
      text-align: center;
      max-width: 260px;
      line-height: 1.45;
    }

    .loader {
      width: 180px;
      height: 10px;
      background: rgba(255,255,255,.26);
      border-radius: 999px;
      overflow: hidden;
      margin-top: 8px;
    }

    .loader span {
      display: block;
      width: 45%;
      height: 100%;
      border-radius: inherit;
      background: #111;
      animation: load 2.2s ease-in-out infinite;
    }

    @keyframes load {
      0% { transform: translateX(-120%); }
      55% { transform: translateX(180%); }
      100% { transform: translateX(180%); }
    }

    .app {
      padding: 28px 18px 110px;
    }

    .statusbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 16px;
      font-size: 13px;
      color: #0c1018;
      font-weight: 700;
    }

    .status-icons {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .dot,
    .bar,
    .battery {
      display: inline-block;
      background: #0c1018;
      border-radius: 99px;
    }

    .dot { width: 8px; height: 8px; }
    .bar { width: 18px; height: 8px; }
    .battery { width: 24px; height: 12px; border-radius: 4px; position: relative; }
    .battery::after {
      content: "";
      position: absolute;
      right: -3px;
      top: 3px;
      width: 2px;
      height: 6px;
      border-radius: 2px;
      background: #0c1018;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 16px;
    }

    .welcome small {
      display: block;
      color: #767d89;
      font-weight: 600;
      margin-bottom: 5px;
    }

    .welcome strong {
      font-size: 24px;
      color: #111418;
      letter-spacing: -.03em;
    }

    .avatar,
    .icon-btn,
    .nav-item,
    .quick-action,
    .service-card,
    .chip {
      user-select: none;
    }

    .top-actions {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .icon-btn, .avatar {
      width: 44px;
      height: 44px;
      border-radius: 14px;
      border: none;
      background: #fff;
      color: #111;
      display: grid;
      place-items: center;
      box-shadow: 0 8px 20px rgba(19,24,35,.08);
    }

    .avatar {
      background: linear-gradient(180deg, #1d222c 0%, #0f1318 100%);
      color: #f5c400;
      font-size: 16px;
      font-weight: 800;
    }

    .security-banner {
      margin-top: 16px;
      background: linear-gradient(180deg, #fff8db 0%, #fff1b4 100%);
      border: 1px solid rgba(245,196,0,.35);
      border-radius: 18px;
      padding: 14px 16px;
      color: #4c3b00;
      display: flex;
      gap: 12px;
      align-items: flex-start;
    }

    .shield {
      width: 36px;
      height: 36px;
      border-radius: 12px;
      background: rgba(255,255,255,.7);
      display: grid;
      place-items: center;
      font-size: 18px;
      flex: 0 0 auto;
    }

    .security-banner strong {
      display: block;
      margin-bottom: 3px;
      color: #2f2500;
      font-size: 14px;
    }

    .security-banner p {
      margin: 0;
      font-size: 12px;
      line-height: 1.45;
    }

    .balance-card {
      margin-top: 18px;
      background:
        radial-gradient(circle at top right, rgba(255,255,255,.2), transparent 28%),
        linear-gradient(135deg, #11151d 0%, #242b38 55%, #11151d 100%);
      color: #fff;
      border-radius: 28px;
      padding: 22px 18px 18px;
      position: relative;
      overflow: hidden;
      box-shadow: 0 18px 35px rgba(17,21,29,.22);
    }

    .balance-card::after {
      content: "";
      position: absolute;
      width: 220px;
      height: 220px;
      border-radius: 50%;
      background: rgba(245,196,0,.08);
      right: -90px;
      top: -60px;
    }

    .label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: .12em;
      color: rgba(255,255,255,.6);
    }

    .balance-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      position: relative;
      z-index: 1;
    }

    .balance {
      margin-top: 10px;
      font-size: 34px;
      font-weight: 800;
      letter-spacing: -.05em;
    }

    .toggle-balance {
      background: rgba(255,255,255,.12);
      border: 1px solid rgba(255,255,255,.12);
      color: #fff;
      padding: 10px 14px;
      border-radius: 14px;
      font-size: 12px;
      font-weight: 700;
    }

    .acc-meta {
      margin-top: 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: relative;
      z-index: 1;
      font-size: 13px;
      color: rgba(255,255,255,.8);
      gap: 10px;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 16px;
      position: relative;
      z-index: 1;
    }

    .chip {
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.1);
      padding: 9px 12px;
      border-radius: 999px;
      font-size: 12px;
      color: rgba(255,255,255,.85);
    }

    .section-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 22px 2px 14px;
    }

    .section-head h2 {
      margin: 0;
      font-size: 18px;
      color: #12151c;
      letter-spacing: -.02em;
    }

    .section-head button {
      border: none;
      background: transparent;
      color: #767d89;
      font-weight: 700;
      font-size: 12px;
    }

    .quick-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }

    .quick-action {
      background: #fff;
      border-radius: 20px;
      padding: 14px 8px;
      box-shadow: 0 10px 24px rgba(17,24,39,.06);
      text-align: center;
      border: 1px solid rgba(17,24,39,.04);
      cursor: pointer;
      transition: transform .2s ease, box-shadow .2s ease;
    }

    .quick-action:active,
    .service-card:active,
    .nav-item:active,
    .icon-btn:active,
    .toggle-balance:active,
    .secondary-btn:active,
    .primary-btn:active,
    .shortcut:active {
      transform: scale(.98);
    }

    .qa-icon {
      width: 48px;
      height: 48px;
      border-radius: 16px;
      background: linear-gradient(180deg, #fff7ce 0%, #ffe78c 100%);
      display: grid;
      place-items: center;
      margin: 0 auto 10px;
      font-size: 22px;
      color: #2e2400;
    }

    .quick-action span {
      display: block;
      font-size: 12px;
      color: #20242d;
      font-weight: 700;
      line-height: 1.3;
    }

    .shortcut-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: 12px;
    }

    .shortcut {
      background: linear-gradient(180deg, #11151d 0%, #1f2430 100%);
      color: white;
      border-radius: 16px;
      padding: 14px 12px;
      box-shadow: 0 10px 24px rgba(17,21,29,.12);
      border: none;
      text-align: left;
      cursor: pointer;
    }

    .shortcut strong {
      display: block;
      font-size: 13px;
      margin-bottom: 4px;
    }

    .shortcut small {
      color: rgba(255,255,255,.65);
      font-size: 11px;
      line-height: 1.35;
    }

    .service-list {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .service-card {
      background: #fff;
      border-radius: 22px;
      padding: 16px;
      box-shadow: 0 10px 24px rgba(17,24,39,.06);
      border: 1px solid rgba(17,24,39,.04);
      cursor: pointer;
    }

    .service-card .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #fff8da;
      color: #4c3b00;
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 11px;
      font-weight: 700;
      margin-bottom: 12px;
    }

    .service-card h3 {
      margin: 0 0 6px;
      font-size: 16px;
      color: #11151d;
      letter-spacing: -.02em;
    }

    .service-card p {
      margin: 0;
      color: #737986;
      font-size: 12px;
      line-height: 1.45;
    }

    .transactions {
      margin-top: 10px;
      background: #fff;
      border-radius: 22px;
      padding: 6px;
      box-shadow: 0 10px 24px rgba(17,24,39,.06);
      border: 1px solid rgba(17,24,39,.04);
    }

    .txn {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 10px;
      border-bottom: 1px solid #f1f3f6;
    }

    .txn:last-child { border-bottom: none; }

    .txn-left {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .txn-icon {
      width: 42px;
      height: 42px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      font-size: 18px;
      color: #111;
      background: linear-gradient(180deg, #fff7cf 0%, #ffe082 100%);
      flex: 0 0 auto;
    }

    .txn-meta {
      min-width: 0;
    }

    .txn-meta strong {
      display: block;
      color: #12161d;
      font-size: 14px;
      margin-bottom: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .txn-meta small {
      color: #7a818d;
      font-size: 12px;
    }

    .txn-amount {
      text-align: right;
      flex: 0 0 auto;
    }

    .txn-amount strong {
      display: block;
      font-size: 14px;
      margin-bottom: 3px;
      color: #11161d;
    }

    .txn-amount small {
      font-size: 11px;
      font-weight: 800;
      letter-spacing: .03em;
      color: var(--success);
    }

    .txn-amount small.debit { color: var(--danger); }

    .bottom-nav {
      position: absolute;
      left: 14px;
      right: 14px;
      bottom: 14px;
      background: rgba(17,21,29,.95);
      border-radius: 24px;
      padding: 10px 8px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
      box-shadow: 0 18px 40px rgba(0,0,0,.22);
      backdrop-filter: blur(14px);
      z-index: 15;
    }

    .nav-item {
      border: none;
      background: transparent;
      color: rgba(255,255,255,.64);
      border-radius: 18px;
      padding: 10px 8px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      font-size: 11px;
      font-weight: 700;
    }

    .nav-item.active {
      background: linear-gradient(180deg, rgba(245,196,0,.23), rgba(245,196,0,.1));
      color: #fff;
    }

    .fab {
      position: absolute;
      right: 18px;
      bottom: 92px;
      width: 62px;
      height: 62px;
      border: none;
      border-radius: 22px;
      background: linear-gradient(180deg, #f5c400 0%, #e0aa00 100%);
      color: #161200;
      font-size: 28px;
      box-shadow: 0 18px 34px rgba(245,196,0,.35);
      z-index: 16;
      cursor: pointer;
      font-weight: 900;
    }

    .modal {
      position: absolute;
      inset: 0;
      background: rgba(7,10,14,.48);
      display: flex;
      align-items: flex-end;
      justify-content: center;
      z-index: 70;
      opacity: 0;
      pointer-events: none;
      transition: opacity .25s ease;
      backdrop-filter: blur(8px);
    }

    .modal.open {
      opacity: 1;
      pointer-events: auto;
    }

    .sheet {
      width: 100%;
      background: linear-gradient(180deg, #fff 0%, #fafbff 100%);
      border-radius: 26px 26px 0 0;
      padding: 14px 18px 28px;
      transform: translateY(26px);
      transition: transform .25s ease;
      box-shadow: 0 -20px 60px rgba(0,0,0,.15);
      max-height: 84%;
      overflow: auto;
    }

    .modal.open .sheet {
      transform: translateY(0);
    }

    .grabber {
      width: 60px;
      height: 6px;
      border-radius: 999px;
      background: #e6e8ee;
      margin: 4px auto 16px;
    }

    .sheet-head {
      display: flex;
      align-items: start;
      justify-content: space-between;
      gap: 14px;
    }

    .sheet-head h3 {
      margin: 0;
      color: #12161d;
      font-size: 20px;
      letter-spacing: -.02em;
    }

    .sheet-head p {
      margin: 6px 0 0;
      color: #727885;
      font-size: 13px;
      line-height: 1.45;
    }

    .close-btn {
      width: 40px;
      height: 40px;
      border: none;
      background: #f4f6fb;
      border-radius: 14px;
      font-size: 20px;
      color: #111;
      cursor: pointer;
      flex: 0 0 auto;
    }

    .demo-note {
      margin-top: 14px;
      background: #fff8da;
      border: 1px solid rgba(245,196,0,.34);
      border-radius: 16px;
      padding: 14px;
      color: #4e3d00;
      font-size: 13px;
      line-height: 1.5;
    }

    .form-grid {
      display: grid;
      gap: 12px;
      margin-top: 16px;
    }

    .field {
      background: #f6f7fb;
      border: 1px solid #eceff5;
      border-radius: 16px;
      padding: 14px;
    }

    .field label {
      display: block;
      color: #747b87;
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .fake-input {
      color: #141923;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: -.01em;
    }

    .action-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 18px;
    }

    .primary-btn,
    .secondary-btn {
      border: none;
      border-radius: 16px;
      padding: 15px 14px;
      font-size: 14px;
      font-weight: 800;
      cursor: pointer;
    }

    .primary-btn {
      background: linear-gradient(180deg, #f5c400 0%, #dfa900 100%);
      color: #161200;
      box-shadow: 0 14px 24px rgba(245,196,0,.25);
    }

    .secondary-btn {
      background: #11151d;
      color: #fff;
    }

    .tiny {
      font-size: 12px;
      color: #77808d;
      line-height: 1.45;
      margin-top: 12px;
    }

    .toast {
      position: absolute;
      left: 18px;
      right: 18px;
      bottom: 156px;
      background: rgba(17,21,29,.96);
      color: #fff;
      border-radius: 18px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 20px 40px rgba(0,0,0,.24);
      transform: translateY(30px);
      opacity: 0;
      pointer-events: none;
      transition: all .28s ease;
      z-index: 90;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    .toast-icon {
      width: 38px;
      height: 38px;
      border-radius: 12px;
      background: rgba(245,196,0,.18);
      display: grid;
      place-items: center;
      flex: 0 0 auto;
      color: #f5c400;
      font-weight: 900;
    }

    .toast strong {
      display: block;
      font-size: 14px;
      margin-bottom: 2px;
    }

    .toast span {
      color: rgba(255,255,255,.72);
      font-size: 12px;
      line-height: 1.4;
    }

    @media (max-width: 430px) {
      body { padding: 0; }
      .phone {
        width: 100%;
        min-height: 100dvh;
        border-radius: 0;
      }
      .screen, .phone { min-height: 100dvh; }
    }
  </style>
</head>
<body>

    <div class="notch" aria-hidden="true"></div>
    <section class="screen">
      <div class="splash" id="splash" aria-live="polite">
        <div class="logo-wrap">
          <div class="logo-mark" aria-hidden="true"></div>
        </div>
        <div class="brand-title">Test by EFK</div>
        <div class="brand-sub">A demo fintech-style mobile app interface built with one HTML file. This is a UI concept only, not a real bank.</div>
        <div class="loader" aria-hidden="true"><span></span></div>
      </div>

      <div class="app">
        <div class="statusbar">
          <span id="clock">9:41</span>
          <div class="status-icons" aria-hidden="true">
            <span class="dot"></span>
            <span class="bar"></span>
            <span class="battery"></span>
          </div>
        </div>

        <div class="topbar">
          <div class="welcome">
            <small>Welcome back</small>
            <strong>EFK Demo User</strong>
          </div>
          <div class="top-actions">
            <button class="icon-btn" data-open="security">🔒</button>
            <div class="avatar" aria-label="Profile">EF</div>
          </div>
        </div>

        <div class="security-banner">
          <div c
